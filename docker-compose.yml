services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo-data:
